---
name: Docker release

on:
  workflow_dispatch:

  pull_request:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "src/**"
      - "tests/**"
      - ".github/workflows/docker-release.yml"
      - "package*.json"
      - "playwright.config*.ts"
  push:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "src/**"
      - "tests/**"
      - ".github/workflows/docker-release.yml"
      - "package*.json"
      - "playwright.config*.ts"

permissions:
  contents: read

concurrency:
  group: "release-oblt-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  fork-notification:
    if: github.event.repository.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Fork notification
        run: |
          echo "::notice title=Docker build skipped::This workflow does not run on repository forks for security reasons. Docker images are only built and published from the main repository."
          echo "ℹ️  Please create a feature branch in the main repository to trigger Docker builds and releases."
          exit 1

  docker:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4.0.0

      - name: Login to Docker registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4.1.0
        with:
          registry: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}
          username: ${{ secrets.ELASTIC_DOCKER_USERNAME }}
          password: ${{ secrets.ELASTIC_DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # ratchet:docker/metadata-action@v6.0.0
        with:
          images: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}/observability-ci/oblt-playwright
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # ratchet:docker/build-push-action@v7.1.0
        id: build
        with:
            context: .
            platforms: linux/amd64
            push: true
            sbom: true
            provenance: mode=max
            labels: ${{ steps.meta.outputs.labels }}
            tags: ${{ steps.meta.outputs.tags }}
            cache-from: type=registry,ref=${{ secrets.ELASTIC_DOCKER_REGISTRY }}/observability-ci/oblt-playwright:buildcache
            cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/observability-ci/oblt-playwright:buildcache,mode=max', secrets.ELASTIC_DOCKER_REGISTRY) || '' }}
