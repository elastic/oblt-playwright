---
name: Docker release

on:
  workflow_dispatch:

  pull_request:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "src/**"
      - "tests/**"
      - ".github/workflows/docker-release.yml"
      - "package*.json"
      - "playwright.config*.ts"
  push:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "src/**"
      - "tests/**"
      - ".github/workflows/docker-release.yml"
      - "package*.json"
      - "playwright.config*.ts"

permissions:
  contents: read

concurrency:
  group: "release-oblt-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  fork-notification:
    if: github.event.repository.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Fork notification
        run: |
          echo "::notice title=Docker build skipped::This workflow does not run on repository forks for security reasons. Docker images are only built and published from the main repository."
          echo "ℹ️  Please create a feature branch in the main repository to trigger Docker builds and releases."
          exit 1

  docker:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # ratchet:docker/setup-buildx-action@v4.2.0

      - name: Login to Docker registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # ratchet:docker/login-action@v4.4.0
        with:
          registry: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}
          username: ${{ secrets.ELASTIC_DOCKER_USERNAME }}
          password: ${{ secrets.ELASTIC_DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # ratchet:docker/metadata-action@v6.2.0
        with:
          images: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}/observability-ci/oblt-playwright
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # ratchet:docker/build-push-action@v7.3.0
        id: build
        with:
            context: .
            platforms: linux/amd64
            push: true
            sbom: true
            provenance: mode=max
            labels: ${{ steps.meta.outputs.labels }}
            tags: ${{ steps.meta.outputs.tags }}
            cache-from: type=registry,ref=${{ secrets.ELASTIC_DOCKER_REGISTRY }}/observability-ci/oblt-playwright:buildcache
            cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/observability-ci/oblt-playwright:buildcache,mode=max', secrets.ELASTIC_DOCKER_REGISTRY) || '' }}
