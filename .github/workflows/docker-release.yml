---
name: Docker release

on:
  workflow_dispatch:

  pull_request:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "src/**"
      - "tests/**"
      - ".github/workflows/docker-release.yml"
      - "package*.json"
      - "playwright.config*.ts"
  push:
    branches:
      - "main"
    paths:
      - "Dockerfile"
      - "src/**"
      - "tests/**"
      - ".github/workflows/docker-release.yml"
      - "package*.json"
      - "playwright.config*.ts"

permissions:
  contents: read

concurrency:
  group: "release-oblt-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  fork-notification:
    if: github.event.repository.fork == true
    runs-on: ubuntu-latest
    steps:
      - name: Fork notification
        run: |
          echo "::notice title=Docker build skipped::This workflow does not run on repository forks for security reasons. Docker images are only built and published from the main repository."
          echo "ℹ️  Please create a feature branch in the main repository to trigger Docker builds and releases."
          exit 1

  docker:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4.1.0

      - name: Login to Docker registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}
          username: ${{ secrets.ELASTIC_DOCKER_USERNAME }}
          password: ${{ secrets.ELASTIC_DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # ratchet:docker/metadata-action@v6.1.0
        with:
          images: ${{ secrets.ELASTIC_DOCKER_REGISTRY }}/observability-ci/oblt-playwright
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7.2.0
        id: build
        with:
            context: .
            platforms: linux/amd64
            push: true
            sbom: true
            provenance: mode=max
            labels: ${{ steps.meta.outputs.labels }}
            tags: ${{ steps.meta.outputs.tags }}
            cache-from: type=registry,ref=${{ secrets.ELASTIC_DOCKER_REGISTRY }}/observability-ci/oblt-playwright:buildcache
            cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/observability-ci/oblt-playwright:buildcache,mode=max', secrets.ELASTIC_DOCKER_REGISTRY) || '' }}
